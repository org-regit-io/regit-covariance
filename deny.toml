# cargo-deny configuration (v2 format)
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# paste 1.0.15 is unmaintained (RUSTSEC-2024-0436) but it's a transitive dep
# from nalgebra → simba → paste. No action available until nalgebra updates.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
